<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post | Alora Radiance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    ink: '#152219',
                    'ink-light': '#1F3327',
                    'ink-soft': '#28402F',
                    parchment: '#F7F2E7',
                    card: '#FFFFFF',
                    clay: '#A24C3D',
                    'clay-light': '#C97E63',
                    'clay-dark': '#7E3A2F',
                    sage: '#6C8763',
                    'sage-light': '#E7ECDF',
                    gold: '#BB9556',
                    ash: '#6B685F',
                },
                fontFamily: {
                    sans: ['"PT Sans"', 'Manrope', 'sans-serif'],
                    fraunces: ['Fraunces', 'serif'],
                    roboto: ['"Roboto Mono"', 'monospace'],
                },
            }
        }
    }
    </script>
    <style>
        /* Quill/Rich Text Editor se aane wali images ko responsive rakhne ke liye */
        .post-body-content img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 1.5rem auto;
            display: block;
        }
        .post-body-content p {
            margin-bottom: 1.25rem;
            line-height: 1.75;
        }
    </style>
</head>
<body class="bg-parchment font-sans text-ink min-h-screen flex flex-col">

    <div id="navbar-placeholder"></div>

    <main class="flex-grow max-w-4xl w-full mx-auto px-6 py-12">
        <!-- Back Button -->
        <a href="./Blog.html" class="inline-flex items-center gap-2 text-clay font-semibold mb-8 hover:underline">
            <i class="fa-solid fa-arrow-left"></i> Back to Blogs
        </a>

        <!-- Blog Header Area -->
        <article id="blog-content-area" class="hidden">
            <div class="mb-6">
                <div class="flex items-center space-x-3 text-xs tracking-wide mb-3">
                    <span id="post-date" class="text-ash font-roboto"></span>
                    <span class="text-ash">•</span>
                    <span id="post-category" class="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded text-[11px] font-medium uppercase font-roboto"></span>
                </div>
                <h1 id="post-title" class="text-3xl md:text-5xl font-fraunces font-bold text-ink leading-tight mb-6"></h1>
            </div>

            <!-- Big Cover Image -->
            <div class="w-full aspect-[16/9] rounded-2xl overflow-hidden shadow-sm mb-10 bg-gray-100">
                <img id="post-cover" src="" alt="" class="w-full h-full object-cover">
            </div>

            <!-- Main Dynamic Body Text & Inside Images Container -->
            <div id="post-body" class="post-body-content text-base md:text-lg text-ink/90">
                <!-- Rich text content will parse here dynamically -->
            </div>
        </article>

        <!-- Loader Status Layout -->
        <div id="post-loader" class="text-center py-20 text-ash">
            <i class="fa-solid fa-spinner fa-spin text-3xl mb-3 text-clay"></i>
            <p>Fetching full article details...</p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="./js/include.js"></script>
    <!-- Hum isi page ke script layer ko niche dynamic module me handle karenge -->
    <script type="module" src="./js/post-detail.js"></script>
</body>
</html>
