<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Alora Radiance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800 tracking-tight">Reset Password</h2>

    <form id="resetPasswordForm" class="space-y-4">
      <div>
        <label class="block text-gray-600 text-sm font-medium mb-1">New Password</label>
        <!-- 🎯 FIX: id="newPassword" clearly defined here -->
        <input 
          type="password" 
          id="newPassword" 
          required 
          placeholder="Enter new password"
          minlength="6"
          class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition"
        >
      </div>

      <button 
        type="submit" 
        class="w-full bg-[#2A2A24] text-white py-2.5 rounded-xl font-semibold hover:bg-orange-600 transition shadow-sm cursor-pointer"
      >
        Update Password
      </button>
    </form>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 1. Get Token from URL Query Params
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      const resetForm = document.getElementById("resetPasswordForm");
      const newPasswordInput = document.getElementById("newPassword");

      if (!token) {
        alert("Reset token missing hai! Kripya email me aaye poore link par click karein.");
        return;
      }

      // 2. Form Submit Event
      resetForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const newPassword = newPasswordInput ? newPasswordInput.value.trim() : "";

        if (!newPassword || newPassword.length < 6) {
          alert("Password kam se kam 6 characters ka hona chahiye!");
          return;
        }

        try {
          const response = await fetch(`${BASE_URL}/api/auth/reset-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ token, newPassword })
          });

          const data = await response.json();

          if (response.ok) {
            alert(data.message || "Password successfully update ho gaya hai!");
            // Redirect to Login Page
            window.location.href = "http://127.0.0.1:5500/frontend/login.html";
          } else {
            alert(data.message || "Password reset nahi ho paya.");
          }
        } catch (error) {
          console.error("Reset Password Error:", error);
          alert("Server Error! Ensure karein Backend port 5000 par chal raha hai.");
        }
      });
    });
  </script>

</body>
</html>
